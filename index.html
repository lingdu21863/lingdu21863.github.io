<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词朗读器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 30px; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-danger { background: #ff6b6b; color: white; }
        .btn-success { background: #51cf66; color: white; }
        .word-display { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); border-radius: 12px; margin-bottom: 20px; }
        .current-word { font-size: 48px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .word-definition { font-size: 18px; color: #666; line-height: 1.6; }
        .progress { text-align: center; margin-bottom: 20px; color: #888; }
        .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .settings { background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .setting-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .setting-row label { min-width: 80px; font-weight: 600; color: #555; }
        .setting-row input[type="range"] { flex: 1; max-width: 200px; }
        .setting-row select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; }
        .word-list { height: 500px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px; }
        .word-item { padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        .word-item:hover { background: #f0f0f0; }
        .word-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .status { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .status.loading { background: #fff3cd; color: #856404; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.success { background: #d4edda; color: #155724; }
        .hidden { display: none; }
        .file-input-wrapper { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .file-input-wrapper label { font-weight: 600; color: #555; }
        .file-input-wrapper select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; min-width: 200px; }
        .file-input-wrapper input[type="file"] { display: none; }
        .file-input-wrapper .btn-upload { background: #667eea; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .main-content { display: flex; gap: 20px; margin-top: 20px; }
        .left-panel { flex: 1; min-width: 300px; }
        .right-panel { flex: 1.5; min-width: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>英语单词朗读器</h1>
        <div id="status" class="status loading hidden">正在加载单词...</div>
        <div class="file-input-wrapper">
            <label>选择文件:</label>
            <select id="fileSelect" onchange="loadSelectedFile()">
                <option value="">-- 请选择 --</option>
                <option value="1 初中-乱序.txt">1 初中-乱序.txt</option>
                <option value="2 高中-乱序.txt">2 高中-乱序.txt</option>
                <option value="3 四级-乱序.txt">3 四级-乱序.txt</option>
                <option value="4 六级-乱序.txt">4 六级-乱序.txt</option>
                <option value="5 考研-乱序.txt">5 考研-乱序.txt</option>
                <option value="6 托福-乱序.txt">6 托福-乱序.txt</option>
                <option value="7 SAT-乱序.txt">7 SAT-乱序.txt</option>
            </select>
            <label class="btn-upload" for="fileUpload">或上传本地文件</label>
            <input type="file" id="fileUpload" accept=".txt" onchange="loadUploadedFile(event)">
        </div>
        <div class="main-content">
            <div class="left-panel">
                <h3 style="margin-bottom: 10px; color: #333;">单词列表</h3>
                <div class="word-list" id="wordList"><p style="color: #888; text-align: center;">加载单词后显示列表</p></div>
            </div>
            <div class="right-panel">
                <div class="progress">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
                    <span id="progressText">0 / 0</span>
                </div>
                <div class="word-display">
                    <div class="current-word" id="currentWord">点击加载单词开始</div>
                    <div class="word-definition" id="wordDefinition"></div>
                </div>
                <div class="controls">
                    <button class="btn-primary" onclick="loadWords()">加载单词</button>
                    <button class="btn-success" onclick="speakCurrent()">朗读当前</button>
                    <button class="btn-primary" onclick="prevWord()">上一个</button>
                    <button class="btn-primary" onclick="nextWord()">下一个</button>
                    <button class="btn-secondary" onclick="toggleAutoPlay()"><span id="autoPlayBtn">自动播放</span></button>
                    <button class="btn-danger" onclick="stopSpeaking()">停止朗读</button>
                </div>
                <div class="settings">
                    <div class="setting-row">
                        <label>发音引擎:</label>
                        <select id="engineSelect">
                            <option value="browser">浏览器语音 (免费)</option>
                            <option value="google">Google TTS (推荐)</option>
                            <option value="responsivevoice">ResponsiveVoice</option>
                            <option value="voicerss">Voice RSS</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <label>语速:</label>
                        <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="0.8" onchange="updateRate()">
                        <span id="rateValue">0.8</span>
                    </div>
                    <div class="setting-row">
                        <label>间隔(秒):</label>
                        <input type="range" id="intervalRange" min="1" max="10" step="0.5" value="3" onchange="updateInterval()">
                        <span id="intervalValue">3</span>
                    </div>
                    <div class="setting-row">
                        <label>语音:</label>
                        <select id="voiceSelect" onchange="updateVoice()"><option value="">默认语音</option></select>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=free"></script>
    <script>
        let words=[],currentIndex=0,isAutoPlaying=false,autoPlayTimer=null,currentRate=0.8,currentInterval=3,audioElement=null;
        function loadVoices(){const v=speechSynthesis.getVoices(),s=document.getElementById('voiceSelect');s.innerHTML='<option value="">默认语音</option>';const ev=v.filter(x=>x.lang.startsWith('en'));ev.forEach((x,i)=>s.innerHTML+='<option value="'+i+'">'+x.name+' ('+x.lang+')</option>');console.log('已加载'+ev.length+'个英语语音');}
        if(speechSynthesis.onvoiceschanged!==undefined){speechSynthesis.onvoiceschanged=loadVoices;}
        setTimeout(loadVoices,100);
        function parseWordText(text){return text.split('\n').map(l=>l.trim()).filter(l=>l).map(l=>{const p=l.split('\t');return{word:p[0]||'',definition:p.slice(1).join('\t')||''};}).filter(i=>i.word);}
        async function loadWords(){const st=document.getElementById('status');st.className='status loading';st.textContent='正在加载单词...';st.classList.remove('hidden');try{const r=await fetch('./1 初中-乱序.txt');if(!r.ok)throw new Error('文件加载失败');const t=await r.text();words=parseWordText(t);if(!words.length)throw new Error('未找到有效单词');currentIndex=0;displayCurrentWord();renderWordList();updateProgress();st.className='status success';st.textContent='成功加载 '+words.length+' 个单词';setTimeout(()=>st.classList.add('hidden'),2000);}catch(e){st.className='status error';st.textContent='加载失败: '+e.message;}}
        async function loadSelectedFile(){const select=document.getElementById('fileSelect');const filename=select.value;if(!filename)return;const st=document.getElementById('status');st.className='status loading';st.textContent='正在加载 '+filename+'...';st.classList.remove('hidden');try{const r=await fetch('./'+filename);if(!r.ok)throw new Error('文件加载失败');const t=await r.text();words=parseWordText(t);if(!words.length)throw new Error('未找到有效单词');currentIndex=0;displayCurrentWord();renderWordList();updateProgress();st.className='status success';st.textContent='成功加载 '+words.length+' 个单词';setTimeout(()=>st.classList.add('hidden'),2000);}catch(e){st.className='status error';st.textContent='加载失败: '+e.message;}}
        function loadUploadedFile(event){const file=event.target.files[0];if(!file)return;const st=document.getElementById('status');st.className='status loading';st.textContent='正在加载 '+file.name+'...';st.classList.remove('hidden');const reader=new FileReader();reader.onload=function(e){try{const t=e.target.result;words=parseWordText(t);if(!words.length)throw new Error('未找到有效单词');currentIndex=0;displayCurrentWord();renderWordList();updateProgress();st.className='status success';st.textContent='成功加载 '+words.length+' 个单词';setTimeout(()=>st.classList.add('hidden'),2000);}catch(err){st.className='status error';st.textContent='加载失败: '+err.message;}};reader.readAsText(file);}
        function displayCurrentWord(){if(!words.length)return;const w=words[currentIndex];document.getElementById('currentWord').textContent=w.word;document.getElementById('wordDefinition').textContent=w.definition;const items=document.querySelectorAll('.word-item');items.forEach((x,i)=>x.classList.toggle('active',i===currentIndex));const activeItem=items[currentIndex];if(activeItem)activeItem.scrollIntoView({behavior:'smooth',block:'center'});}
        function renderWordList(){const l=document.getElementById('wordList');l.innerHTML='';words.forEach((x,i)=>{const d=document.createElement('div');d.className='word-item'+(i===currentIndex?' active':'');d.textContent=(i+1)+'. '+x.word;d.onclick=()=>{currentIndex=i;displayCurrentWord();updateProgress();speakCurrent();};l.appendChild(d);});}
        function updateProgress(){const p=words.length?((currentIndex+1)/words.length*100):0;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=(currentIndex+1)+' / '+words.length;}
        function speakCurrent(){
            if(!words.length){alert('请先加载单词！');return;}
            stopSpeaking();
            const engine=document.getElementById('engineSelect').value;
            const word=words[currentIndex].word;
            switch(engine){
                case 'google': speakWithGoogleTTS(word); break;
                case 'responsivevoice': speakWithResponsiveVoice(word); break;
                case 'voicerss': speakWithVoiceRSS(word); break;
                default: speakWithBrowser(word);
            }
        }
        function speakWithBrowser(word){
            if(!('speechSynthesis'in window)){alert('您的浏览器不支持语音朗读功能，请使用Chrome、Edge或Safari浏览器');return;}
            const u=new SpeechSynthesisUtterance(word);
            u.rate=currentRate;
            u.lang='en-US';
            const v=speechSynthesis.getVoices();
            const s=document.getElementById('voiceSelect');
            if(s.value&&v[parseInt(s.value)]){u.voice=v[parseInt(s.value)];}
            else{const e=v.find(x=>x.lang.startsWith('en'));if(e)u.voice=e;}
            u.onerror=function(e){console.error('朗读错误:',e.error);};
            speechSynthesis.speak(u);
            console.log('正在朗读(浏览器):',word);
        }
        function speakWithGoogleTTS(word){
            audioElement=new Audio();
            const url='https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q='+encodeURIComponent(word);
            audioElement.src=url;
            audioElement.onloadedmetadata=function(){
                if(audioElement.duration){
                    audioElement.play().catch(e=>{console.error('Google TTS播放失败:',e);speakWithBrowser(word);});
                    console.log('正在朗读(Google):',word);
                }else{speakWithBrowser(word);}
            };
            audioElement.onerror=function(){console.error('Google TTS加载失败');speakWithBrowser(word);};
        }
        function speakWithResponsiveVoice(word){
            if(typeof responsiveVoice!=='undefined'){
                responsiveVoice.speak(word,'US English Female',{rate:currentRate,onerror:function(){speakWithBrowser(word);}});
                console.log('正在朗读(ResponsiveVoice):',word);
            }else{
                console.error('ResponsiveVoice未加载');
                speakWithBrowser(word);
            }
        }
        function speakWithVoiceRSS(word){
            audioElement=new Audio();
            const url='https://api.voicerss.org/?key=free&hl=en-us&src='+encodeURIComponent(word)+'&r='+Math.round((currentRate-1)*10);
            audioElement.src=url;
            audioElement.onloadedmetadata=function(){
                audioElement.play().catch(e=>{console.error('Voice RSS播放失败:',e);speakWithBrowser(word);});
                console.log('正在朗读(Voice RSS):',word);
            };
            audioElement.onerror=function(){console.error('Voice RSS加载失败');speakWithBrowser(word);};
        }
        function stopSpeaking(){
            speechSynthesis.cancel();
            if(audioElement){audioElement.pause();audioElement.currentTime=0;}
            if(typeof responsiveVoice!=='undefined')responsiveVoice.cancel();
        }
        function nextWord(){if(!words.length)return;currentIndex=(currentIndex+1)%words.length;displayCurrentWord();updateProgress();if(isAutoPlaying)speakCurrent();}
        function prevWord(){if(!words.length)return;currentIndex=(currentIndex-1+words.length)%words.length;displayCurrentWord();updateProgress();if(isAutoPlaying)speakCurrent();}
        function toggleAutoPlay(){if(!words.length){alert('请先加载单词！');return;}isAutoPlaying=!isAutoPlaying;document.getElementById('autoPlayBtn').textContent=isAutoPlaying?'停止自动':'自动播放';if(isAutoPlaying)startAutoPlay();else stopAutoPlay();}
        function startAutoPlay(){if(!words.length)return;speakCurrent();autoPlayTimer=setInterval(nextWord,currentInterval*1000);}
        function stopAutoPlay(){if(autoPlayTimer){clearInterval(autoPlayTimer);autoPlayTimer=null;}stopSpeaking();}
        function updateRate(){currentRate=parseFloat(document.getElementById('rateRange').value);document.getElementById('rateValue').textContent=currentRate;}
        function updateInterval(){currentInterval=parseFloat(document.getElementById('intervalRange').value);document.getElementById('intervalValue').textContent=currentInterval;if(isAutoPlaying){stopAutoPlay();startAutoPlay();}}
        function updateVoice(){}
        document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextWord();else if(e.key==='ArrowLeft')prevWord();else if(e.key===' '){e.preventDefault();speakCurrent();}});
    </script>
</body>
</html>
