<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词朗读器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📖 英语单词朗读器</h1>

        <div id="status" class="status hidden"></div>

        <div class="header">
            <select id="fileSelect">
                <option value="">-- 请选择词库 --</option>
                <option value="1 初中-乱序.txt">初中 乱序</option>
                <option value="2 高中-乱序.txt">高中 乱序</option>
                <option value="3 四级-乱序.txt">四级 乱序</option>
                <option value="4 六级-乱序.txt">六级 乱序</option>
                <option value="5 考研-乱序.txt">考研 乱序</option>
                <option value="6 托福-乱序.txt">托福 乱序</option>
                <option value="7 SAT-乱序.txt">SAT 乱序</option>
            </select>
            <button id="refreshBtn">🔄 刷新单词</button>
        </div>

        <div class="main">
            <div class="left-panel">
                <h3>📋 单词列表</h3>
                <div class="word-list" id="wordList">
                    <p style="text-align:center; color:#94a3b8; padding: 40px;">请选择词库</p>
                </div>
            </div>

            <div class="right-panel">
                <div class="progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">0 / 0</div>
                </div>

                <div class="word-card" id="wordCard">
                    <div class="current-word" id="currentWord">✨ 选择词库开始</div>
                    <div class="word-definition" id="wordDefinition">点击卡片可朗读</div>
                </div>

                <div class="controls">
                    <button id="prevBtn">⏪ 上一个</button>
                    <button id="speakBtn" class="success">🔊 朗读</button>
                    <button id="nextBtn">下一个 ⏩</button>
                    <button id="autoPlayBtn">▶ 自动播放</button>
                </div>

                <div class="settings">
                    <div class="setting-row">
                        <label>语音：</label>
                        <select id="voiceSelect"></select>
                    </div>
                    <div class="setting-row">
                        <label>语速：</label>
                        <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="0.7">
                        <span id="rateValue">0.7</span>
                    </div>
                    <div class="setting-row">
                        <label>间隔：</label>
                        <input type="range" id="intervalRange" min="1" max="10" step="0.5" value="3">
                        <span id="intervalValue">3.0秒</span>
                    </div>
                </div>

                <div class="keyboard-hints">
                    <span><kbd>↑</kbd> 上一个</span>
                    <span><kbd>↓</kbd> 下一个</span>
                    <span><kbd>空格</kbd> 播放/暂停</span>
                    <span>点击卡片朗读</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
